name: Feature request
description: Suggest a new RDR2 Mod Manager feature
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What RDR2 mod management problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature and how it should work.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Profiles
        - Backups
        - Conflict detection
        - Compatibility
        - UI
        - CLI
        - Documentation
        - Other
